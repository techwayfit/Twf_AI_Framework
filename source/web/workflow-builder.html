<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowForge — Workflow Builder</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e11;
    --surface: #13151a;
    --panel: #1a1d24;
    --border: #252830;
    --border-bright: #353945;
    --accent: #f0c040;
    --accent2: #40d0f0;
    --accent3: #e040a0;
    --text: #e8eaf0;
    --text-muted: #6b7080;
    --text-dim: #3a3f50;
    --node-trigger: #1a2535;
    --node-trigger-b: #2060c0;
    --node-action: #1a2520;
    --node-action-b: #20a060;
    --node-condition: #25201a;
    --node-condition-b: #c08020;
    --node-output: #251a2a;
    --node-output-b: #a020c0;
    --node-transform: #1a2535;
    --node-transform-b: #2090c0;
    --node-w: 210px;
    --conn-in: #40d0f0;
    --conn-out: #c09010;
    --radius: 8px;
    --grid-dot: #252830;
    --grid-line: #1c1f28;
    --shadow: rgba(0,0,0,.4);
  }

  /* ── LIGHT THEME ─────────────────────────────── */
  :root.light {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --panel: #f8f9fb;
    --border: #d8dce6;
    --border-bright: #b0b8cc;
    --accent: #d4920a;
    --accent2: #0880b0;
    --accent3: #b02080;
    --text: #1a1d28;
    --text-muted: #5a6070;
    --text-dim: #9aa0b8;
    --conn-in: #0880b0;
    --conn-out: #c09010;
    --grid-dot: #d0d4de;
    --grid-line: #e4e8f0;
    --shadow: rgba(0,0,0,.12);
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

  /* LAYOUT */
  #app { display: grid; grid-template-rows: 48px 1fr; grid-template-columns: 220px 1fr 280px; height: 100vh; }

  /* TOPBAR */
  #topbar {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0;
    padding: 0 16px;
    position: relative; z-index: 100;
  }
  #logo { font-size: 15px; font-weight: 800; letter-spacing: -0.5px; margin-right: 24px; }
  #logo span { color: var(--accent); }
  .top-sep { width: 1px; height: 24px; background: var(--border); margin: 0 12px; }
  .top-btn {
    height: 30px; padding: 0 12px; border-radius: 5px;
    border: 1px solid var(--border-bright); background: transparent;
    color: var(--text-muted); font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .top-btn:hover { border-color: var(--accent); color: var(--accent); }
  .top-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .top-btn.primary:hover { background: #f5d060; }
  .top-btn.danger { color: #f04040; border-color: #3a1515; }
  .top-btn.danger:hover { border-color: #f04040; }
  #wf-name { background: transparent; border: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; outline: none; margin-left: 4px; width: 180px; }
  #wf-name:focus { border-bottom: 1px solid var(--accent); }
  .spacer { flex: 1; }
  #status-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 3px 10px; border-radius: 20px; background: #0f2010; color: #40c040; border: 1px solid #1a4020; }

  /* NODE PALETTE */
  #palette {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #palette-header { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); }
  #palette-header h3 { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  #palette-search { width: 100%; margin-top: 8px; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; outline: none; }
  #palette-search:focus { border-color: var(--accent2); }
  #palette-search::placeholder { color: var(--text-dim); }
  #palette-list { flex: 1; overflow-y: auto; padding: 8px; }
  #palette-list::-webkit-scrollbar { width: 4px; }
  #palette-list::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
  .palette-group { margin-bottom: 12px; }
  .palette-group-label { font-size: 9px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--text-dim); padding: 4px 6px; margin-bottom: 4px; }
  .palette-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 5px;
    border: 1px solid transparent;
    cursor: grab; transition: all .12s;
    margin-bottom: 2px; font-size: 12px; font-weight: 600;
    user-select: none;
  }
  .palette-item:hover { background: var(--border); border-color: var(--border-bright); }
  .palette-item:active { cursor: grabbing; opacity: 0.7; }
  .palette-icon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; }

  /* CANVAS */
  #canvas-wrap {
    position: relative; overflow: hidden; background: var(--bg);
    cursor: default;
  }
  #grid-canvas { position: absolute; inset: 0; pointer-events: none; }
  #svg-layer { position: absolute; inset: 0; pointer-events: none; overflow: visible; }
  #connections-group { pointer-events: all; }
  #nodes-layer { position: absolute; inset: 0; pointer-events: none; }
  #canvas-controls {
    position: absolute; bottom: 16px; left: 16px; z-index: 50;
    display: flex; gap: 4px;
  }
  .canvas-ctrl-btn {
    width: 32px; height: 32px; border-radius: 6px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .canvas-ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  #zoom-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); display: flex; align-items: center; padding: 0 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; }
  #theme-btn { font-size: 14px; min-width: 32px; transition: all .2s; }
  :root.light #theme-btn { content: '☾'; }
  #minimap { position: absolute; bottom: 16px; right: 16px; width: 150px; height: 90px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; z-index: 50; }

  /* NODES */
  .node {
    position: absolute;
    width: var(--node-w);
    border-radius: var(--radius);
    border: 1.5px solid var(--border-bright);
    background: var(--surface);
    box-shadow: 0 4px 24px var(--shadow);
    cursor: move;
    transition: box-shadow .15s;
    user-select: none;
    z-index: 10;
    pointer-events: all;
    overflow: visible;
  }
  .node:hover { box-shadow: 0 8px 40px var(--shadow); z-index: 20; }
  .node.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(240,192,64,.2), 0 8px 40px rgba(0,0,0,.6); z-index: 30; }
  .node-header {
    padding: 8px 10px 7px;
    border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 7px;
    transition: background .2s;
  }
  :root.light .node-header { filter: brightness(2.5) saturate(0.6); }
  :root.light .node { background: var(--surface); }
  :root.light .node-desc { color: var(--text-muted); }
  :root.light .node-status { color: var(--text-dim); }
  :root.light .ctx-item:hover { background: var(--border); }
  :root.light #ctx-menu { box-shadow: 0 8px 32px rgba(0,0,0,.15); }
  :root.light .toast-msg { box-shadow: 0 2px 12px rgba(0,0,0,.15); }
  :root.light #var-modal > div { box-shadow: 0 8px 40px rgba(0,0,0,.2); }
  .node-icon { width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .node-title { font-size: 12px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-badge { font-family: 'JetBrains Mono', monospace; font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .node-body { padding: 14px 10px 6px; }
  .node-desc { font-size: 10px; color: var(--text-muted); line-height: 1.4; }

  /* Edge port dots — absolutely placed on node boundary */
  .port-dot {
    position: absolute;
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid; background: var(--bg);
    cursor: crosshair;
    transition: opacity .15s, box-shadow .12s, transform .12s;
    z-index: 20;
    pointer-events: all;
  }
  .port-dot:hover { transform: scale(1.45) !important; box-shadow: 0 0 8px currentColor; }
  .port-dot.output { border-color: var(--conn-out); }
  .port-dot.connected { background: currentColor; }

  /* INPUT PORT VISIBILITY RULES */
  /* Hide all input ports by default */
  .port-dot.input { border-color: var(--conn-in); opacity: 0; pointer-events: none; }
  /* Always show: slot-0 (first left port) and any connected port */
  .port-dot.input[data-slot="0"],
  .port-dot.input.connected { opacity: 1; pointer-events: all; }
  /* When a connector is being dragged: reveal ALL input ports on ALL nodes */
  #canvas-wrap.connecting-mode .port-dot.input {
    opacity: 1;
    pointer-events: all;
    animation: portPulse .7s ease-in-out infinite alternate;
  }
  #canvas-wrap.connecting-mode .port-dot.input[data-slot="0"],
  #canvas-wrap.connecting-mode .port-dot.input.connected {
    animation: none;
    opacity: 1;
  }
  @keyframes portPulse {
    from { box-shadow: 0 0 0px var(--conn-in); }
    to   { box-shadow: 0 0 10px var(--conn-in); transform: scale(1.2); }
  }

  /* Port label tooltips — only visible when connecting or on hover */
  .port-tip {
    position: absolute;
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    color: var(--text-dim); pointer-events: none;
    white-space: nowrap; line-height: 1;
    opacity: 0; transition: opacity .15s;
  }
  /* Show input tips when connecting-mode is active */
  #canvas-wrap.connecting-mode .port-tip { opacity: 1; }
  /* Always show output tips on hover */
  .node:hover .port-tip { opacity: 1; }

  .node-footer { padding: 5px 10px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .node-status { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); }
  .node-delete { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; padding: 2px; transition: color .1s; line-height: 1; }
  .node-delete:hover { color: #f04040; }

  /* PROPERTIES PANEL */
  #props {
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #props-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
  #props-header h3 { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  #props-header .ph-title { font-size: 14px; font-weight: 700; margin-top: 4px; }
  #props-body { flex: 1; overflow-y: auto; padding: 12px; }
  #props-body::-webkit-scrollbar { width: 4px; }
  #props-body::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
  #props-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--text-dim); font-size: 12px; text-align: center; padding: 20px; }
  #props-empty .pe-icon { font-size: 32px; opacity: 0.3; }

  .prop-group { margin-bottom: 16px; }
  .prop-group-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .prop-field { margin-bottom: 10px; }
  .prop-label { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; display: block; font-family: 'JetBrains Mono', monospace; }
  .prop-input, .prop-select, .prop-textarea {
    width: 100%; padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; outline: none;
    transition: border-color .12s;
  }
  .prop-input:focus, .prop-select:focus, .prop-textarea:focus { border-color: var(--accent2); }
  .prop-select { cursor: pointer; }
  .prop-textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
  .prop-toggle { display: flex; align-items: center; justify-content: space-between; }
  .toggle-switch { width: 32px; height: 18px; background: var(--border); border-radius: 9px; position: relative; cursor: pointer; transition: background .15s; }
  .toggle-switch.on { background: var(--accent2); }
  .toggle-knob { width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left .15s; }
  .toggle-switch.on .toggle-knob { left: 16px; }
  .prop-badge-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .prop-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; border: 1px solid; cursor: pointer; transition: all .12s; font-family: 'JetBrains Mono', monospace; }
  .kv-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .kv-row input { flex: 1; }
  .kv-add { width: 100%; padding: 5px; background: transparent; border: 1px dashed var(--border-bright); border-radius: 4px; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all .12s; font-family: 'Syne', sans-serif; }
  .kv-add:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Special node styles */
  .node[data-type='start'] .node-header { border-bottom-color: #e05030; }
  .node[data-type='end']   .node-header { border-bottom-color: #e05030; }
  .node[data-type='start'] { border-color: #e05030; }
  .node[data-type='end']   { border-color: #e05030; }

  /* Variable panel in props */
  .var-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-top: 6px; }
  .var-table th { text-align: left; color: var(--text-dim); font-weight: 600; padding: 4px 6px; border-bottom: 1px solid var(--border); letter-spacing: .08em; }
  .var-table td { padding: 4px 6px; border-bottom: 1px solid var(--border); color: var(--text-muted); }
  .var-table tr:hover td { background: var(--border); }
  .var-row-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 11px; }
  .var-row-del:hover { color: #f04040; }
  .var-add-row { display: flex; gap: 4px; margin-top: 6px; }
  .var-add-row input, .var-add-row select { flex: 1; }
  .var-add-btn { padding: 5px 10px; background: var(--accent2); border: none; border-radius: 4px; color: #000; font-family: 'Syne',sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; }
  .var-add-btn:hover { opacity: .85; }

  /* CONNECTIONS */
  .conn-path { fill: none; stroke-width: 2; pointer-events: stroke; cursor: pointer; }
  .conn-path:hover { stroke-width: 3; }
  .conn-preview { fill: none; stroke-width: 2; stroke: var(--accent); stroke-dasharray: 6 4; pointer-events: none; }

  /* CONTEXT MENU */
  #ctx-menu {
    position: fixed; z-index: 1000;
    background: var(--panel);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    padding: 4px;
    min-width: 160px;
    display: none;
  }
  .ctx-item {
    padding: 7px 12px; border-radius: 4px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .1s;
    display: flex; align-items: center; gap: 8px;
  }
  .ctx-item:hover { background: var(--border); }
  .ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }
  .ctx-item.danger { color: #f04040; }

  /* TOAST */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; }
  .toast-msg { background: var(--panel); border: 1px solid var(--border-bright); border-radius: 6px; padding: 8px 16px; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; animation: toastIn .2s ease; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <div id="logo">Flow<span>Forge</span></div>
    <div class="top-sep"></div>
    <input id="wf-name" value="My Workflow" spellcheck="false" />
    <div class="top-sep"></div>
    <button class="top-btn" onclick="addNodeFromMenu()">＋ Add Node</button>
    <button class="top-btn" onclick="openVarManager()" style="border-color:#30b0a066;color:#30b0a0">⊞ Variables</button>
    <button class="top-btn" onclick="clearCanvas()">⊘ Clear</button>
    <button class="top-btn danger" onclick="deleteSelected()">✕ Delete</button>
    <div class="spacer"></div>
    <div id="status-pill">● DRAFT</div>
    <div class="top-sep"></div>
    <button class="top-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark theme">☀</button>
    <div style="position:relative;display:inline-block" id="export-wrap">
      <button class="top-btn" onclick="toggleExportMenu()" id="export-btn">↓ Export ▾</button>
      <div id="export-menu" style="display:none;position:absolute;right:0;top:36px;background:var(--panel);border:1px solid var(--border-bright);border-radius:6px;box-shadow:0 8px 24px var(--shadow);z-index:500;min-width:150px;padding:4px;">
        <div class="ctx-item" onclick="exportWorkflow();closeExportMenu()">⊟ JSON</div>
        <div class="ctx-item" onclick="exportSVG();closeExportMenu()">◈ SVG</div>
        <div class="ctx-item" onclick="exportPNG();closeExportMenu()">▣ PNG</div>
      </div>
    </div>
    <button class="top-btn primary" onclick="runWorkflow()">▶ Run</button>
  </div>

  <!-- PALETTE -->
  <div id="palette">
    <div id="palette-header">
      <h3>Node Library</h3>
      <input id="palette-search" type="text" placeholder="Search nodes…" oninput="filterPalette(this.value)">
    </div>
    <div id="palette-list"></div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="grid-canvas"></canvas>
    <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-out" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M1,1 L7,4 L1,7 Z" fill="var(--conn-out)" />
        </marker>
        <marker id="arr-in" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M1,1 L7,4 L1,7 Z" fill="var(--conn-in)" />
        </marker>
      </defs>
      <g id="connections-group"></g>
      <path id="preview-line" class="conn-preview" d="" style="display:none"></path>
    </svg>
    <div id="nodes-layer"></div>
    <div id="canvas-controls">
      <button class="canvas-ctrl-btn" onclick="zoom(-0.1)" title="Zoom Out">−</button>
      <div id="zoom-label">100%</div>
      <button class="canvas-ctrl-btn" onclick="zoom(0.1)" title="Zoom In">＋</button>
      <button class="canvas-ctrl-btn" onclick="resetView()" title="Reset View">⊙</button>
    </div>
    <canvas id="minimap"></canvas>
  </div>

  <!-- PROPERTIES -->
  <div id="props">
    <div id="props-header">
      <h3>Properties</h3>
      <div class="ph-title" id="props-title">—</div>
    </div>
    <div id="props-body">
      <div id="props-empty">
        <div class="pe-icon">◈</div>
        <div>Select a node to<br>edit its properties</div>
      </div>
    </div>
  </div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('duplicate')">⧉ Duplicate Node</div>
  <div class="ctx-item" onclick="ctxAction('edit')">✎ Edit Label</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxAction('delete')">✕ Delete Node</div>
</div>

<div id="toast"></div>

<!-- Variable Manager Modal -->
<div id="var-modal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center">
  <div style="background:var(--panel);border:1px solid var(--border-bright);border-radius:10px;width:560px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.8)">
    <div style="padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <span style="font-size:16px;font-weight:800">⊞ Variables</span>
      <span style="font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;flex:1">Workflow-scoped runtime variables</span>
      <button onclick="closeVarManager()" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;line-height:1">✕</button>
    </div>
    <div style="padding:14px 18px;flex:1;overflow-y:auto">
      <table class="var-table" id="var-table">
        <thead><tr><th>Name</th><th>Type</th><th>Scope</th><th>Default Value</th><th></th></tr></thead>
        <tbody id="var-table-body"></tbody>

// ── CANVAS SETUP ──────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const nodesLayer = document.getElementById('nodes-layer');
const svgLayer = document.getElementById('svg-layer');
const connGroup = document.getElementById('connections-group');
const preview = document.getElementById('preview-line');

function drawGrid() {
  const canvas = document.getElementById('grid-canvas');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  const step = 24 * scale;
  const ox = ((pan.x % step) + step) % step;
  const oy = ((pan.y % step) + step) % step;
  const style = getComputedStyle(document.documentElement);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = style.getPropertyValue('--grid-line').trim();
  ctx.lineWidth = 1;
  for (let x = ox; x < canvas.width; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = oy; y < canvas.height; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  // dots at intersections
  ctx.fillStyle = style.getPropertyValue('--grid-dot').trim();
  for (let x = ox; x < canvas.width; x += step) {
    for (let y = oy; y < canvas.height; y += step) {
      ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill();
    }
  }
}

function applyTransform() {
  nodesLayer.style.transform = `translate(${pan.x}px,${pan.y}px) scale(${scale})`;
  nodesLayer.style.transformOrigin = '0 0';
  svgLayer.style.transform = `translate(${pan.x}px,${pan.y}px) scale(${scale})`;
  svgLayer.style.transformOrigin = '0 0';
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
  drawGrid();
  drawMinimap();
}

function canvasToWorld(cx, cy) {
  return { x: (cx - pan.x) / scale, y: (cy - pan.y) / scale };
}

function zoom(delta) {
  const cx = wrap.clientWidth / 2, cy = wrap.clientHeight / 2;
  const prev = scale;
  scale = Math.max(0.25, Math.min(2, scale + delta));
  pan.x = cx - (cx - pan.x) * scale / prev;
  pan.y = cy - (cy - pan.y) * scale / prev;
  applyTransform();
}

function resetView() {
  pan = { x: 40, y: 40 }; scale = 1; applyTransform();
}

// ── NODE CREATION ─────────────────────────────────────────────────
function getNodDef(type) {
  for (const [cat, def] of Object.entries(NODE_DEFS)) {
    const n = def.nodes.find(n => n.type === type);
    if (n) return { ...n, cat, catDef: def };
  }
}

function addNode(type, cat, wx, wy) {
  const def = getNodDef(type);
  if (!def) return;
  const id = 'n' + (++nodeCounter);
  wx = wx ?? 100 + Math.random() * 300;
  wy = wy ?? 100 + Math.random() * 200;
  const node = { id, type, cat, x: wx, y: wy, label: def.label, props: getDefaultProps(type), def };
  nodes.push(node);
  renderNode(node);
  selectNode(node);
  drawConnections();
  drawMinimap();
  return node;
}

// Port layout: inputs[0..1] → LEFT, inputs[2..3] → TOP
//              outputs[0..1] → RIGHT, outputs[2..3] → BOTTOM
// Positions are percentages along the edge (two slots each)
const SLOT_POS = [['33%','67%'],['33%','67%']]; // [slot0, slot1]

function portEdge(inputs, outputs) {
  // Returns [{portName, dir, side, pct}]
  const list = [];
  const slots = ['33%','67%'];
  inputs.forEach((p,i) => {
    if (i < 2) list.push({ portName:p, dir:'input', side:'left',  pct: slots[i] });
    else        list.push({ portName:p, dir:'input', side:'top',   pct: slots[i-2] });
  });
  outputs.forEach((p,i) => {
    if (i < 2) list.push({ portName:p, dir:'output', side:'right',  pct: slots[i] });
    else        list.push({ portName:p, dir:'output', side:'bottom', pct: slots[i-2] });
  });
  return list;
}

function renderNode(node) {
  const def = node.def;
  const catDef = NODE_DEFS[node.cat];
  const el = document.createElement('div');
  el.className = 'node';
  el.dataset.id = node.id;
  el.dataset.type = node.type;
  el.style.left = node.x + 'px';
  el.style.top = node.y + 'px';

  const badge = def.badge ? `<span class="node-badge" style="background:${catDef.bg};color:${catDef.color};border-color:${catDef.color}33">${def.badge}</span>` : '';

  el.innerHTML = `
    <div class="node-header" style="background:${catDef.bg}">
      <div class="node-icon" style="background:${catDef.color}22;color:${catDef.color}">${def.icon}</div>
      <div class="node-title">${node.label}</div>
      ${badge}
    </div>
    <div class="node-body">
      <div class="node-desc">${def.desc}</div>
    </div>
    <div class="node-footer">
      <span class="node-status" id="ns-${node.id}">idle</span>
      <button class="node-delete" onclick="deleteNode('${node.id}')" title="Delete">✕</button>
    </div>
  `;

  // Place port dots on edges
  const ports = portEdge(def.inputs || [], def.outputs || []);
  let inputSlot = 0;
  ports.forEach(({ portName, dir, side, pct }) => {
    const dot = document.createElement('div');
    dot.className = `port-dot ${dir}`;
    dot.dataset.port = portName;
    dot.dataset.dir  = dir;
    dot.dataset.side = side;
    if (dir === 'input') dot.dataset.slot = inputSlot++;
    dot.title = `${dir === 'input' ? '↓' : '↑'} ${portName}`;

    // Position on edge
    const R = 6; // half dot size
    if (side === 'left')   { dot.style.left = `-${R}px`; dot.style.top  = pct; dot.style.transform = 'translateY(-50%)'; }
    if (side === 'right')  { dot.style.right= `-${R}px`; dot.style.top  = pct; dot.style.transform = 'translateY(-50%)'; }
    if (side === 'top')    { dot.style.top  = `-${R}px`; dot.style.left = pct; dot.style.transform = 'translateX(-50%)'; }
    if (side === 'bottom') { dot.style.bottom=`-${R}px`; dot.style.left = pct; dot.style.transform = 'translateX(-50%)'; }

    // Label tip inside the node
    const tip = document.createElement('span');
    tip.className = 'port-tip';
    tip.textContent = portName;
    if (side === 'left')   { tip.style.left = '6px';  tip.style.top  = pct;  tip.style.transform = 'translateY(-50%)'; }
    if (side === 'right')  { tip.style.right= '6px';  tip.style.top  = pct;  tip.style.transform = 'translateY(-50%)'; }
    if (side === 'top')    { tip.style.top  = '4px';  tip.style.left = pct;  tip.style.transform = 'translateX(-50%)'; }
    if (side === 'bottom') { tip.style.bottom='4px';  tip.style.left = pct;  tip.style.transform = 'translateX(-50%)'; }

    el.appendChild(dot);
    el.appendChild(tip);

    // Mousedown: start connection (output) or repin (input)
    dot.addEventListener('mousedown', e => {
      e.stopPropagation();
      if (dir === 'output') {
        const pos = getDotWorldPos(dot);
        connecting = { fromNode: node.id, fromPort: portName, fromSide: side, startX: pos.x, startY: pos.y };
        preview.style.display = '';
        wrap.classList.add('connecting-mode');
      } else {
        const existingIdx = connections.findIndex(c => c.toNode === node.id && c.toPort === portName);
        if (existingIdx !== -1) {
          const existing = connections[existingIdx];
          connections.splice(existingIdx, 1);
          drawConnections();
          const fp = getPortPos(existing.fromNode, existing.fromPort, 'output');
          connecting = { fromNode: existing.fromNode, fromPort: existing.fromPort, fromSide: fp?.side ?? 'right', startX: fp?.x ?? 0, startY: fp?.y ?? 0 };
          preview.style.display = '';
          wrap.classList.add('connecting-mode');
          toast('Repinning…');
        }
      }
    });

    dot.addEventListener('mouseup', e => {
      e.stopPropagation();
      if (connecting && dir === 'input' && connecting.fromNode !== node.id) {
        const alreadyLinked = connections.some(c => c.fromNode === connecting.fromNode && c.toNode === node.id);
        if (alreadyLinked) { toast('⚠ Already connected'); connecting = null; preview.style.display = 'none'; wrap.classList.remove('connecting-mode'); return; }
        connections.push({ id:'c'+Date.now(), fromNode: connecting.fromNode, fromPort: connecting.fromPort, toNode: node.id, toPort: portName });
        drawConnections();
        toast('Connected!');
      }
      connecting = null;
      preview.style.display = 'none';
      wrap.classList.remove('connecting-mode');
    });
  });

  // Drag node
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('port-dot') || e.target.classList.contains('node-delete')) return;
    e.stopPropagation();
    const dragOff = { x: e.clientX - node.x * scale - pan.x, y: e.clientY - node.y * scale - pan.y };
    dragging = { node, el, dragOff };
    selectNode(node);
  });

  el.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    ctxTarget = node;
    showCtxMenu(e.clientX, e.clientY);
  });

  nodesLayer.appendChild(el);
  node.el = el;
}

function getDotWorldPos(dotEl) {
  const pr = dotEl.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  return canvasToWorld(pr.left + pr.width/2 - wr.left, pr.top + pr.height/2 - wr.top);
}

function selectNode(node) {
  document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
  selectedNode = node;
  if (node) {
    node.el.classList.add('selected');
    renderProps(node);
  }
}

function deleteNode(id) {
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  nodes = nodes.filter(n => n.id !== id);
  connections = connections.filter(c => c.fromNode !== id && c.toNode !== id);
  node.el.remove();
  if (selectedNode?.id === id) { selectedNode = null; renderProps(null); }
  drawConnections();
  drawMinimap();
}

function deleteSelected() {
  if (selectedNode) deleteNode(selectedNode.id);
}

// ── CONNECTIONS ───────────────────────────────────────────────────
function getPortPos(nodeId, portName, dir) {
  const node = nodes.find(n => n.id === nodeId);
  if (!node || !node.el) return null;
  const port = node.el.querySelector(`.port-dot.${dir}[data-port="${portName}"]`);
  if (!port) return null;
  const pr = port.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  const pos = canvasToWorld(pr.left + pr.width/2 - wr.left, pr.top + pr.height/2 - wr.top);
  pos.side = port.dataset.side || (dir === 'input' ? 'left' : 'right');
  return pos;
}

// Direction vectors for each side
function sideVec(side) {
  if (side === 'right')  return [ 1,  0];
  if (side === 'left')   return [-1,  0];
  if (side === 'bottom') return [ 0,  1];
  if (side === 'top')    return [ 0, -1];
  return [1, 0];
}

// Smart bezier: exits port straight for STUB px then curves
function smartBezier(x1, y1, fromSide, x2, y2, toSide) {
  const STUB = 10;   // straight segment before curve
  const dist = Math.hypot(x2 - x1, y2 - y1);
  const tension = Math.max(STUB, dist * 0.35);

  const [fx, fy] = sideVec(fromSide);
  const [tx, ty] = sideVec(toSide);

  // cp1: exits from source along its side
  const cx1 = x1 + fx * tension;
  const cy1 = y1 + fy * tension;
  // cp2: arrives at dest along its side (reversed — wire comes FROM that direction)
  const cx2 = x2 + tx * tension;
  const cy2 = y2 + ty * tension;

  return `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
}

function drawConnections() {
  connGroup.innerHTML = '';
  for (const conn of connections) {
    const from = getPortPos(conn.fromNode, conn.fromPort, 'output');
    const to   = getPortPos(conn.toNode,   conn.toPort,   'input');
    if (!from || !to) continue;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    // Invisible wide hit area
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hit.setAttribute('d', smartBezier(from.x, from.y, from.side, to.x, to.y, to.side));
    hit.setAttribute('fill', 'none');
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', '12');
    hit.style.cursor = 'pointer';

    // Visible path
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', smartBezier(from.x, from.y, from.side, to.x, to.y, to.side));
    path.setAttribute('class', 'conn-path');
    path.setAttribute('stroke', '#f0c04099');
    path.setAttribute('marker-end', 'url(#arr-out)');
    path.dataset.connId = conn.id;

    // Delete ✕ circle at midpoint
    const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
    const delCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    delCircle.setAttribute('cx', mx); delCircle.setAttribute('cy', my);
    delCircle.setAttribute('r', 7);
    delCircle.setAttribute('fill', '#1a1d24');
    delCircle.setAttribute('stroke', '#f04040');
    delCircle.setAttribute('stroke-width', '1.5');
    delCircle.style.cursor = 'pointer';
    delCircle.style.opacity = '0';
    delCircle.style.transition = 'opacity .15s';

    const doDelete = (e) => {
      e.stopPropagation();
      connections = connections.filter(c => c.id !== conn.id);
      drawConnections();
      toast('Connection removed');
    };

    const delText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    delText.setAttribute('x', mx); delText.setAttribute('y', my + 4);
    delText.setAttribute('text-anchor', 'middle');
    delText.setAttribute('font-size', '10');
    delText.setAttribute('fill', '#f04040');
    delText.setAttribute('pointer-events', 'all');
    delText.style.cursor = 'pointer';
    delText.addEventListener('click', doDelete);
    delText.textContent = '✕';
    delText.style.opacity = '0';
    delText.style.transition = 'opacity .15s';

    delCircle.addEventListener('click', doDelete);

    g.appendChild(path);
    g.appendChild(hit);
    g.appendChild(delCircle);
    g.appendChild(delText);

    // Use group-level hover so moving onto the ✕ icon doesn't trigger mouseleave on hit
    g.addEventListener('mouseenter', () => {
      path.setAttribute('stroke', '#f0c040cc');
      path.setAttribute('stroke-width', '3');
      delCircle.style.opacity = '1';
      delText.style.opacity = '1';
    });
    g.addEventListener('mouseleave', () => {
      path.setAttribute('stroke', '#f0c04099');
      path.setAttribute('stroke-width', '2');
      delCircle.style.opacity = '0';
      delText.style.opacity = '0';
      delCircle.setAttribute('fill', '#1a1d24');
    });
    delCircle.addEventListener('mouseenter', () => delCircle.setAttribute('fill', '#3a1515'));
    delCircle.addEventListener('mouseleave', () => delCircle.setAttribute('fill', '#1a1d24'));

    connGroup.appendChild(g);
  }

  // Update port connected state
  document.querySelectorAll('.port-dot').forEach(p => p.classList.remove('connected'));
  for (const conn of connections) {
    const fn = nodes.find(n => n.id === conn.fromNode);
    const tn = nodes.find(n => n.id === conn.toNode);
    if (fn) fn.el.querySelector(`.port-dot.output[data-port="${conn.fromPort}"]`)?.classList.add('connected');
    if (tn) tn.el.querySelector(`.port-dot.input[data-port="${conn.toPort}"]`)?.classList.add('connected');
  }
}

// ── MOUSE EVENTS ──────────────────────────────────────────────────
wrap.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    canvasDragStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    e.preventDefault();
  } else if (e.button === 0 && !e.target.closest('.node')) {
    selectNode(null);
  }
});

wrap.addEventListener('mousemove', e => {
  if (canvasDragStart) {
    pan.x = e.clientX - canvasDragStart.x;
    pan.y = e.clientY - canvasDragStart.y;
    applyTransform();
    return;
  }
  if (dragging) {
    const nx = (e.clientX - pan.x - dragging.dragOff.x) / scale;
    const ny = (e.clientY - pan.y - dragging.dragOff.y) / scale;
    dragging.node.x = nx; dragging.node.y = ny;
    dragging.el.style.left = nx + 'px';
    dragging.el.style.top = ny + 'px';
    drawConnections();
    drawMinimap();
  }
  if (connecting) {
    const wr = wrap.getBoundingClientRect();
    const mp = canvasToWorld(e.clientX - wr.left, e.clientY - wr.top);
    const from = getPortPos(connecting.fromNode, connecting.fromPort, 'output') || { x: connecting.startX, y: connecting.startY, side: connecting.fromSide || 'right' };
    const fromSide = from.side || connecting.fromSide || 'right';
    // Guess toSide as the opposite of fromSide for a natural-looking preview
    const toSideGuess = fromSide === 'right' ? 'left' : fromSide === 'left' ? 'right' : fromSide === 'bottom' ? 'top' : 'bottom';
    preview.setAttribute('d', smartBezier(from.x, from.y, fromSide, mp.x, mp.y, toSideGuess));
  }
});

wrap.addEventListener('mouseup', e => {
  dragging = null; canvasDragStart = null;
  if (connecting) { connecting = null; preview.style.display = 'none'; wrap.classList.remove('connecting-mode'); }
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const wr = wrap.getBoundingClientRect();
  const cx = e.clientX - wr.left, cy = e.clientY - wr.top;
  const prev = scale;
  scale = Math.max(0.25, Math.min(2, scale - e.deltaY * 0.001));
  pan.x = cx - (cx - pan.x) * scale / prev;
  pan.y = cy - (cy - pan.y) * scale / prev;
  applyTransform();
}, { passive: false });

// Drop from palette
wrap.addEventListener('dragover', e => e.preventDefault());
wrap.addEventListener('drop', e => {
  e.preventDefault();
  const type = e.dataTransfer.getData('node-type');
  const cat = e.dataTransfer.getData('node-cat');
  if (!type) return;
  const wr = wrap.getBoundingClientRect();
  const wp = canvasToWorld(e.clientX - wr.left, e.clientY - wr.top);
  addNode(type, cat, wp.x, wp.y);
});

function propInput(nodeId, key, label, value, placeholder='') {
  return `<div class="prop-field"><label class="prop-label">${label}</label>
    <input class="prop-input" value="${String(value).replace(/"/g,'&quot;')}" placeholder="${placeholder}"
      onchange="updateProp('${nodeId}','${key}',this.value)"></div>`;
}
function propSelect(nodeId, key, label, value, opts) {
  const options = opts.map(o => `<option value="${o}" ${o===value?'selected':''}>${o}</option>`).join('');
  return `<div class="prop-field"><label class="prop-label">${label}</label>
    <select class="prop-select" onchange="updateProp('${nodeId}','${key}',this.value)">${options}</select></div>`;
}
function propTextarea(nodeId, key, label, value) {
  return `<div class="prop-field"><label class="prop-label">${label}</label>
    <textarea class="prop-textarea" onchange="updateProp('${nodeId}','${key}',this.value)">${value}</textarea></div>`;
}
function propToggle(nodeId, key, label, value) {
  return `<div class="prop-field prop-toggle">
    <label class="prop-label" style="margin:0">${label}</label>
    <div class="toggle-switch ${value?'on':''}" onclick="toggleProp('${nodeId}','${key}',this)">
      <div class="toggle-knob"></div>
    </div></div>`;
}

function updateNodeLabel(id, val) {
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  node.label = val;
  node.el.querySelector('.node-title').textContent = val;
}
function updateProp(id, key, val) {
  const node = nodes.find(n => n.id === id);
  if (node) node.props[key] = val;
}
function toggleProp(id, key, el) {
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  const v = !node.props[key];
  node.props[key] = v;
  el.classList.toggle('on', v);
}

function ctxAction(action) {
  hideCtxMenu();
  if (!ctxTarget) return;
  if (action === 'delete') deleteNode(ctxTarget.id);
  else if (action === 'duplicate') {
    const src = ctxTarget;
    const node = addNode(src.type, src.cat, src.x + 220, src.y + 20);
    node.props = JSON.parse(JSON.stringify(src.props));
    node.label = src.label + ' (copy)';
    node.el.querySelector('.node-title').textContent = node.label;
    toast('Node duplicated');
  } else if (action === 'edit') {
    const label = prompt('Node label:', ctxTarget.label);
    if (label) { ctxTarget.label = label; ctxTarget.el.querySelector('.node-title').textContent = label; }
  }
}

// ── MINIMAP ───────────────────────────────────────────────────────
function drawMinimap() {
  const canvas = document.getElementById('minimap');
  const W = canvas.width = 150, H = canvas.height = 90;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  if (!nodes.length) return;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs) - 20, maxX = Math.max(...xs) + 220;
  const minY = Math.min(...ys) - 20, maxY = Math.max(...ys) + 120;
  const sx = W / (maxX - minX), sy = H / (maxY - minY);
  const s = Math.min(sx, sy) * 0.9;
  ctx.fillStyle = '#2060c055';
  for (const conn of connections) {
    const fn = nodes.find(n=>n.id===conn.fromNode), tn = nodes.find(n=>n.id===conn.toNode);
    if (!fn || !tn) continue;
    ctx.beginPath();
    ctx.moveTo((fn.x - minX)*s + 5, (fn.y - minY)*s + 5);
    ctx.lineTo((tn.x - minX)*s + 5, (tn.y - minY)*s + 5);
    ctx.strokeStyle = '#f0c04066'; ctx.lineWidth = 1; ctx.stroke();
  }
  for (const node of nodes) {
    const catDef = NODE_DEFS[node.cat];
    ctx.fillStyle = catDef.color + '88';
    ctx.fillRect((node.x - minX)*s + 5, (node.y - minY)*s + 5, 16, 8);
  }
}

function exportWorkflow() {
  const data = {
    name: document.getElementById('wf-name').value,
    nodes: nodes.map(n => ({ id: n.id, type: n.type, cat: n.cat, label: n.label, x: n.x, y: n.y, props: n.props })),
    connections: connections.map(c => ({ ...c }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (data.name || 'workflow').replace(/\s+/g, '_') + '.json';
  a.click();
  toast('Workflow exported!');
}

// ── EXPORT SVG ───────────────────────────────────────────────────
function buildExportSVG(forPNG) {
  if (!nodes.length) { toast('⚠ No nodes to export'); return null; }

  const PADDING = 60;
  const NODE_W = 210, NODE_H = 90;
  const isLight = document.documentElement.classList.contains('light');

  // Compute bounds
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs) - PADDING;
  const minY = Math.min(...ys) - PADDING;
  const maxX = Math.max(...xs) + NODE_W + PADDING;
  const maxY = Math.max(...ys) + NODE_H + PADDING;
  const W = maxX - minX, H = maxY - minY;

  const bg       = isLight ? '#f0f2f5' : '#0d0e11';
  const surface  = isLight ? '#ffffff' : '#13151a';
  const border   = isLight ? '#d8dce6' : '#353945';
  const textC    = isLight ? '#1a1d28' : '#e8eaf0';
  const textMut  = isLight ? '#5a6070' : '#6b7080';
  const connOut  = '#c09010';
  const gridDot  = isLight ? '#d0d4de' : '#252830';

  let svgParts = [];
  svgParts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`);

  // Google Fonts embed
  svgParts.push(`<defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="${connOut}" />
    </marker>
  </defs>`);

  // Background
  svgParts.push(`<rect width="${W}" height="${H}" fill="${bg}"/>`);

  // Grid dots
  const step = 24;
  for (let x = 0; x < W; x += step) {
    for (let y = 0; y < H; y += step) {
      svgParts.push(`<circle cx="${x}" cy="${y}" r="1" fill="${gridDot}" opacity="0.6"/>`);
    }
  }

  // Helper: get port position in SVG coords
  function portSVGPos(nodeId, portName, dir) {
    const n = nodes.find(n => n.id === nodeId);
    if (!n) return null;
    const el = n.el;
    if (!el) return null;
    const dot = el.querySelector(`.port-dot.${dir}[data-port="${portName}"]`);
    if (!dot) return null;
    const nr = el.getBoundingClientRect();
    const dr = dot.getBoundingClientRect();
    const nx = n.x - minX;
    const ny = n.y - minY;
    // Offset from node origin
    const dx = (dr.left + dr.width/2) - (nr.left);
    const dy = (dr.top  + dr.height/2) - (nr.top);
    return { x: nx + dx, y: ny + dy, side: dot.dataset.side };
  }

  // Draw connections
  for (const conn of connections) {
    const from = portSVGPos(conn.fromNode, conn.fromPort, 'output');
    const to   = portSVGPos(conn.toNode,   conn.toPort,   'input');
    if (!from || !to) continue;
    const dist = Math.hypot(to.x - from.x, to.y - from.y);
    const tension = Math.max(10, dist * 0.35);
    const [fx,fy] = from.side==='right'?[1,0]:from.side==='left'?[-1,0]:from.side==='bottom'?[0,1]:[0,-1];
    const [tx,ty] = to.side==='left'?[-1,0]:to.side==='right'?[1,0]:to.side==='top'?[0,-1]:[0,1];
    const cx1 = from.x + fx*tension, cy1 = from.y + fy*tension;
    const cx2 = to.x + tx*tension,   cy2 = to.y + ty*tension;
    svgParts.push(`<path d="M${from.x},${from.y} C${cx1},${cy1} ${cx2},${cy2} ${to.x},${to.y}" fill="none" stroke="${connOut}bb" stroke-width="2" marker-end="url(#arr)"/>`);
  }

  // Draw nodes
  for (const node of nodes) {
    const catDef = NODE_DEFS[node.cat];
    const nx = node.x - minX, ny = node.y - minY;
    const r = 8;

    // Node shadow
    if (!isLight) svgParts.push(`<rect x="${nx+2}" y="${ny+4}" width="${NODE_W}" height="${NODE_H}" rx="${r}" fill="rgba(0,0,0,0.3)"/>`);

    // Node body
    svgParts.push(`<rect x="${nx}" y="${ny}" width="${NODE_W}" height="${NODE_H}" rx="${r}" fill="${surface}" stroke="${border}" stroke-width="1.5"/>`);

    // Header bg
    svgParts.push(`<clipPath id="clip-${node.id}"><rect x="${nx}" y="${ny}" width="${NODE_W}" height="36" rx="${r}"/></clipPath>`);
    svgParts.push(`<rect x="${nx}" y="${ny}" width="${NODE_W}" height="36" fill="${catDef.bg}" clip-path="url(#clip-${node.id})"/>`);
    svgParts.push(`<rect x="${nx}" y="${ny+30}" width="${NODE_W}" height="6" fill="${catDef.bg}"/>`);
    svgParts.push(`<line x1="${nx}" y1="${ny+36}" x2="${nx+NODE_W}" y2="${ny+36}" stroke="${border}" stroke-width="1"/>`);

    // Icon circle
    svgParts.push(`<rect x="${nx+8}" y="${ny+7}" width="22" height="22" rx="4" fill="${catDef.color}22"/>`);
    svgParts.push(`<text x="${nx+19}" y="${ny+22}" text-anchor="middle" font-family="sans-serif" font-size="12" fill="${catDef.color}">${node.def.icon}</text>`);

    // Title
    svgParts.push(`<text x="${nx+36}" y="${ny+22}" font-family="'Syne',sans-serif" font-size="12" font-weight="700" fill="${textC}" clip-path="url(#clip-${node.id})">${node.label}</text>`);

    // Description
    svgParts.push(`<text x="${nx+10}" y="${ny+52}" font-family="'JetBrains Mono',monospace" font-size="9" fill="${textMut}">${node.def.desc.substring(0,30)}${node.def.desc.length>30?'…':''}</text>`);

    // Footer line
    svgParts.push(`<line x1="${nx}" y1="${ny+NODE_H-22}" x2="${nx+NODE_W}" y2="${ny+NODE_H-22}" stroke="${border}" stroke-width="1"/>`);
    svgParts.push(`<text x="${nx+10}" y="${ny+NODE_H-9}" font-family="'JetBrains Mono',monospace" font-size="8" fill="${textMut}">idle</text>`);

    // Port dots
    const portList = portEdge(node.def.inputs||[], node.def.outputs||[]);
    let slotIdx = 0;
    portList.forEach(({portName, dir, side, pct}) => {
      const isInput = dir === 'input';
      const portColor = isInput ? '#40d0f0' : connOut;
      const connected = connections.some(c => isInput ? (c.toNode===node.id && c.toPort===portName) : (c.fromNode===node.id && c.fromPort===portName));
      if (isInput && slotIdx > 0 && !connected) { slotIdx++; return; }
      if (isInput) slotIdx++;
      // Map pct to px
      const pctVal = parseFloat(pct) / 100;
      let px, py;
      if (side==='left')   { px = nx;         py = ny + NODE_H * pctVal; }
      if (side==='right')  { px = nx + NODE_W; py = ny + NODE_H * pctVal; }
      if (side==='top')    { px = nx + NODE_W * pctVal; py = ny; }
      if (side==='bottom') { px = nx + NODE_W * pctVal; py = ny + NODE_H; }
      svgParts.push(`<circle cx="${px}" cy="${py}" r="6" fill="${connected ? portColor : surface}" stroke="${portColor}" stroke-width="2"/>`);
      if (isInput) {
        svgParts.push(`<text x="${px+9}" y="${py+3}" font-family="'JetBrains Mono',monospace" font-size="7" fill="${textMut}">${portName}</text>`);
      }
    });
  }

  svgParts.push('</svg>');
  return { svg: svgParts.join('\n'), W, H };
}

function exportSVG() {
  const result = buildExportSVG(false);
  if (!result) return;
  const blob = new Blob([result.svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('wf-name').value || 'workflow').replace(/\s+/g,'_') + '.svg';
  a.click();
  toast('SVG exported!');
}

async function exportPNG() {
  const result = buildExportSVG(true);
  if (!result) return;
  const SCALE = 2; // retina
  const canvas = document.createElement('canvas');
  canvas.width  = result.W * SCALE;
  canvas.height = result.H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);
  const img = new Image();
  const svgBlob = new Blob([result.svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(svgBlob);
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = (document.getElementById('wf-name').value || 'workflow').replace(/\s+/g,'_') + '.png';
    a.click();
    toast('PNG exported!');
  };
  img.onerror = () => { toast('⚠ PNG export failed'); URL.revokeObjectURL(url); };
  img.src = url;
}

function runWorkflow() {
  const triggers = nodes.filter(n => n.def.inputs.length === 0);
  if (!triggers.length) { toast('⚠ No trigger nodes found'); return; }
  let delay = 0;
  nodes.forEach(n => { document.getElementById('ns-' + n.id).textContent = 'idle'; });
  const run = (nodeId) => {
    const node = nodes.find(n => n.id === nodeId);
    if (!node) return;
    setTimeout(() => {
      const statusEl = document.getElementById('ns-' + nodeId);
      statusEl.textContent = 'running';
      statusEl.style.color = 'var(--accent)';
      setTimeout(() => {
        statusEl.textContent = 'done ✓';
        statusEl.style.color = '#40c040';
        const nexts = connections.filter(c => c.fromNode === nodeId).map(c => c.toNode);
        nexts.forEach(run);
      }, 300 + Math.random() * 400);
    }, delay += 200);
  };
  triggers.forEach(t => run(t.id));
  toast('▶ Running workflow…');
}

function addNodeFromMenu() {
  const types = Object.values(NODE_DEFS).flatMap(d => d.nodes.map(n => n.type));
  const type = prompt('Enter node type:\n' + types.join(', '), 'http');
  if (!type) return;
  const cat = Object.entries(NODE_DEFS).find(([,d]) => d.nodes.some(n=>n.type===type))?.[0];
  if (!cat) { toast('⚠ Unknown node type'); return; }
  const wr = wrap.getBoundingClientRect();
  const cx = (wr.width/2 - pan.x) / scale;
  const cy = (wr.height/2 - pan.y) / scale;
  addNode(type, cat, cx - 100, cy - 60);
}

// ── TOAST ─────────────────────────────────────────────────────────
function toggleTheme() {
  const root = document.documentElement;
  const isLight = root.classList.toggle('light');
  const btn = document.getElementById('theme-btn');
  btn.textContent = isLight ? '☾' : '☀';
  btn.title = isLight ? 'Switch to dark theme' : 'Switch to light theme';
  // Redraw grid immediately with new colors
  drawGrid();
}

function toast(msg) {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-msg'; el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ── VARIABLE MANAGER ────────────────────────────────────────────────
function openVarManager() {
  renderVarTable();
  const modal = document.getElementById('var-modal');
  modal.style.display = 'flex';
}
function closeVarManager() {
  document.getElementById('var-modal').style.display = 'none';
}
function renderVarTable() {
  const tbody = document.getElementById('var-table-body');
  if (!wfVariables.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:12px">No variables defined yet</td></tr>';
    return;
  }
  tbody.innerHTML = wfVariables.map((v, i) => `
    <tr>
      <td><input class="prop-input" value="${v.name}" onchange="wfVariables[${i}].name=this.value" style="width:100%"></td>
      <td>
        <select class="prop-select" onchange="wfVariables[${i}].type=this.value">
          ${['string','number','boolean','object','array'].map(t=>`<option ${t===v.type?'selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td>
        <select class="prop-select" onchange="wfVariables[${i}].scope=this.value">
          ${['workflow','session','global'].map(s=>`<option ${s===v.scope?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td><input class="prop-input" value="${v.value}" onchange="wfVariables[${i}].value=this.value" style="width:100%"></td>
      <td><button class="var-row-del" onclick="deleteVariable(${i})">✕</button></td>
    </tr>`).join('');
}
function addVariable() {
  const name  = document.getElementById('vn-name').value.trim();
  const type  = document.getElementById('vn-type').value;
  const scope = document.getElementById('vn-scope').value;
  const value = document.getElementById('vn-value').value.trim();
  if (!name) { toast('⚠ Enter a variable name'); return; }
  if (wfVariables.some(v => v.name === name && v.scope === scope)) { toast('⚠ Variable already exists'); return; }
  wfVariables.push({ name, type, scope, value });
  document.getElementById('vn-name').value = '';
  document.getElementById('vn-value').value = '';
  renderVarTable();
  toast(`Variable '${name}' added`);
}
function deleteVariable(i) {
  const name = wfVariables[i].name;
  wfVariables.splice(i, 1);
  renderVarTable();
  toast(`Variable '${name}' removed`);
}
// Close modal on backdrop click
document.getElementById('var-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('var-modal')) closeVarManager();
});

// ── INIT ──────────────────────────────────────────────────────────
buildPalette();
resetView();
window.addEventListener('resize', () => { drawGrid(); drawMinimap(); });
